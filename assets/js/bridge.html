<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Lib Bridge</title>
  <style>
    body {
      font-family: monospace;
      padding: 10px;
      background: #1a1a1a;
      color: #00ff00;
    }
    #log {
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="log">Bridge loading...</div>
  <script src="core_lib.js"></script>
  <script>
    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.textContent += '\n' + msg;
      console.log(msg);
    }
    log('Bridge HTML loaded');
  </script>
</body>
</html>
