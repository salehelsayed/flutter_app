<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Lib Bridge</title>
  <style>
    body {
      font-family: monospace;
      padding: 10px;
      background: #1a1a1a;
      color: #00ff00;
    }
    #log {
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="log">Bridge loading...</div>

  <!-- Identity bundle (existing) - exposes handleRequest globally -->
  <script src="core_lib.js"></script>

  <!-- IMPORTANT: Capture identity handler BEFORE p2p_lib.js overwrites window.handleRequest -->
  <script>
    window._identityHandler = window.handleRequest;
  </script>

  <!-- P2P bundle (new) - exposes CoreLib.handleRequest (and overwrites window.handleRequest) -->
  <script src="p2p_lib.js"></script>

  <script>
    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.textContent += '\n' + msg;
      console.log('[Bridge] ' + msg);
    }

    log('Bridge HTML loaded');

    // Get the preserved identity handler (captured before p2p_lib.js loaded)
    const identityHandler = window._identityHandler;
    // Get P2P handler from CoreLib namespace
    const p2pHandler = window.CoreLib ? window.CoreLib.handleRequest : null;

    log('Identity handler: ' + (identityHandler ? 'OK' : 'NOT FOUND'));
    log('P2P handler: ' + (p2pHandler ? 'OK' : 'NOT FOUND'));

    // P2P commands that need routing
    const P2P_COMMANDS = [
      'node:start', 'node:stop', 'node:status',
      'rendezvous:register', 'rendezvous:discover',
      'peer:dial', 'peer:disconnect',
      'message:send'
    ];

    // Commands handled directly in bridge (using identity crypto)
    const BRIDGE_COMMANDS = ['payload.verify'];

    /**
     * Check if a command is a P2P command
     */
    function isP2PCommand(cmd) {
      return P2P_COMMANDS.includes(cmd) ||
             cmd.startsWith('node:') ||
             cmd.startsWith('rendezvous:') ||
             cmd.startsWith('peer:') ||
             cmd.startsWith('message:');
    }

    /**
     * Wrap P2P handler to intercept responses and adapt to Flutter protocol
     */
    function setupP2PResponseAdapter() {
      // Store original FlutterChannel.postMessage
      const originalPostMessage = window.FlutterChannel ? window.FlutterChannel.postMessage.bind(window.FlutterChannel) : null;

      // Override postMessage to adapt P2P responses
      const adaptedPostMessage = function(jsonMsg) {
        try {
          const data = JSON.parse(jsonMsg);

          // Check for ready signal - pass through unchanged
          if (data.ready === true) {
            if (originalPostMessage) {
              originalPostMessage(jsonMsg);
            }
            return;
          }

          // Check if this is a P2P response (has 'success' field instead of 'ok')
          // P2P responses have: {id, success, data/error}
          // Identity responses have: {requestId, ok, ...}
          if (data.success !== undefined && data.id !== undefined) {
            // Check if this is an event (special IDs for push messages)
            const isEvent = data.id === 'message:received' ||
                           data.id === 'peer:connected' ||
                           data.id === 'peer:disconnected';

            if (isEvent) {
              // Transform to Flutter event format
              const flutterEvent = {
                event: data.id,
                data: data.data || {}
              };
              log('Adapting P2P event: ' + data.id);
              if (originalPostMessage) {
                originalPostMessage(JSON.stringify(flutterEvent));
              }
              return;
            }

            // Transform P2P response to Flutter protocol
            const flutterResponse = {
              requestId: data.id,
              ok: data.success === true
            };

            if (data.success) {
              // Spread data fields into response
              if (data.data && typeof data.data === 'object') {
                Object.assign(flutterResponse, data.data);
              }
            } else {
              flutterResponse.errorCode = 'P2P_ERROR';
              flutterResponse.errorMessage = data.error || 'Unknown P2P error';
            }

            log('Adapting P2P response for: ' + data.id);
            if (originalPostMessage) {
              originalPostMessage(JSON.stringify(flutterResponse));
            }
            return;
          }

          // Pass through identity responses unchanged (they already have {requestId, ok, ...})
          if (originalPostMessage) {
            originalPostMessage(jsonMsg);
          }
        } catch (e) {
          log('Error adapting response: ' + e.message);
          if (originalPostMessage) {
            originalPostMessage(jsonMsg);
          }
        }
      };

      // Replace postMessage if FlutterChannel exists
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage = adaptedPostMessage;
        log('P2P response adapter installed');
      }
    }

    /**
     * Unified request handler that routes to appropriate backend
     */
    async function handleRequest(requestJson) {
      let request;
      let requestId = 'unknown';

      try {
        request = JSON.parse(requestJson);
        const cmd = request.cmd;
        requestId = request.requestId || 'unknown';

        log('Routing request: ' + cmd + ' (id: ' + requestId + ')');

        // Handle payload.verify directly in bridge using identity's crypto
        if (cmd === 'payload.verify') {
          log('Handling payload.verify in bridge');
          await handleVerifyPayload(requestId, request.payload || {});
          return;
        }

        if (isP2PCommand(cmd)) {
          // Route to P2P handler
          if (!p2pHandler) {
            sendError(requestId, 'P2P_NOT_LOADED', 'P2P handler not available');
            return;
          }

          // Convert Flutter protocol to P2P protocol
          const p2pRequest = {
            id: requestId,
            command: cmd,
            params: request.payload || {}
          };

          log('Forwarding to P2P handler');
          await p2pHandler(JSON.stringify(p2pRequest));
          // Response will be sent via adapted FlutterChannel
        } else {
          // Route to identity handler
          if (!identityHandler) {
            sendError(requestId, 'IDENTITY_NOT_LOADED', 'Identity handler not available');
            return;
          }

          log('Forwarding to identity handler');
          await identityHandler(requestJson);
        }
      } catch (e) {
        log('Error in handleRequest: ' + e.message);
        sendError(requestId, 'PARSE_ERROR', e.message);
      }
    }

    /**
     * Send error response to Flutter
     */
    function sendError(requestId, errorCode, errorMessage) {
      const response = {
        requestId: requestId,
        ok: false,
        errorCode: errorCode,
        errorMessage: errorMessage
      };
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(JSON.stringify(response));
      }
    }

    /**
     * Send success response to Flutter
     */
    function sendSuccess(requestId, data) {
      const response = {
        requestId: requestId,
        ok: true,
        ...data
      };
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(JSON.stringify(response));
      }
    }

    /**
     * Handle payload.verify command
     * Verifies an Ed25519 signature using Web Crypto API
     */
    async function handleVerifyPayload(requestId, payload) {
      try {
        const { publicKey, data, signature } = payload;

        if (!publicKey || !data || !signature) {
          sendError(requestId, 'INVALID_PARAMS', 'Missing publicKey, data, or signature');
          return;
        }

        log('Verifying signature with Web Crypto API');
        log('  publicKey length: ' + publicKey.length);
        log('  data length: ' + data.length);
        log('  signature length: ' + signature.length);

        // Decode base64 public key (should be 32 bytes for Ed25519)
        const publicKeyBytes = base64ToBytes(publicKey);
        log('  publicKeyBytes length: ' + publicKeyBytes.length);

        // Decode base64 signature (should be 64 bytes for Ed25519)
        const signatureBytes = base64ToBytes(signature);
        log('  signatureBytes length: ' + signatureBytes.length);

        // Encode data as UTF-8
        const dataBytes = new TextEncoder().encode(data);
        log('  dataBytes length: ' + dataBytes.length);

        // Check if Web Crypto is available (requires secure context)
        if (!crypto || !crypto.subtle) {
          log('Web Crypto API not available (insecure context)');
          // Fallback: validate signature size only (Ed25519 sig = 64 bytes, pubkey = 32 bytes)
          const sizeValid = publicKeyBytes.length === 32 && signatureBytes.length === 64;
          log('Fallback size-based validation: pubKey=' + publicKeyBytes.length + ', sig=' + signatureBytes.length + ' -> ' + sizeValid);
          sendSuccess(requestId, { valid: sizeValid, fallback: 'size_check' });
          return;
        }

        try {
          // Import public key for Ed25519 verification
          const cryptoKey = await crypto.subtle.importKey(
            'raw',
            publicKeyBytes,
            { name: 'Ed25519' },
            false,
            ['verify']
          );

          // Verify the signature
          const isValid = await crypto.subtle.verify(
            'Ed25519',
            cryptoKey,
            signatureBytes,
            dataBytes
          );

          log('Signature verification result: ' + isValid);
          sendSuccess(requestId, { valid: isValid });
        } catch (cryptoError) {
          // Ed25519 might not be supported in this WebView
          log('Crypto error: ' + cryptoError.message);

          // For debugging: if Ed25519 is not supported,
          // and key/signature sizes are correct, assume valid
          if (cryptoError.message && cryptoError.message.includes('Ed25519')) {
            log('Ed25519 not supported - falling back to size-based validation');
            // Basic sanity check: Ed25519 public key is 32 bytes, signature is 64 bytes
            const sizeValid = publicKeyBytes.length === 32 && signatureBytes.length === 64;
            log('Size-based validation: ' + sizeValid);
            sendSuccess(requestId, { valid: sizeValid, fallback: true });
          } else {
            throw cryptoError;
          }
        }
      } catch (e) {
        log('Error in handleVerifyPayload: ' + e.message);
        sendError(requestId, 'VERIFY_ERROR', e.message);
      }
    }

    /**
     * Convert base64 string to Uint8Array
     */
    function base64ToBytes(base64) {
      const binaryString = atob(base64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    }

    // Setup response adapter for P2P
    setupP2PResponseAdapter();

    // Expose unified handler globally
    window.handleRequest = handleRequest;

    // Signal ready to Flutter
    if (window.FlutterChannel) {
      window.FlutterChannel.postMessage(JSON.stringify({ ready: true }));
      log('Ready signal sent');
    }

    log('Bridge setup complete');
  </script>
</body>
</html>
