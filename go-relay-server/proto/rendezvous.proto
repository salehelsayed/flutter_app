// Reference only — Go code uses manual protowire encoding/decoding in pb.go.
// This matches the @canvas-js/libp2p-rendezvous protocol used by the JS server.
//
// To regenerate (optional):
//   protoc --go_out=. --go_opt=paths=source_relative proto/rendezvous.proto

syntax = "proto2";

package rendezvous.pb;

message Message {
  enum MessageType {
    REGISTER          = 0;
    REGISTER_RESPONSE = 1;
    UNREGISTER        = 2;
    DISCOVER          = 3;
    DISCOVER_RESPONSE = 4;
  }

  enum ResponseStatus {
    OK                              = 0;
    E_INVALID_NAMESPACE             = 100;
    E_INVALID_SIGNED_PEER_RECORD    = 101;
    E_INVALID_TTL                   = 102;
    E_INVALID_COOKIE                = 103;
    E_NOT_AUTHORIZED                = 200;
    E_INTERNAL_ERROR                = 300;
    E_UNAVAILABLE                   = 400;
  }

  message Register {
    optional string ns               = 1;
    optional bytes  signedPeerRecord = 2;
    optional uint64 ttl              = 3;
  }

  message RegisterResponse {
    optional ResponseStatus status     = 1;
    optional string         statusText = 2;
    optional uint64         ttl        = 3;
  }

  message Unregister {
    optional string ns = 1;
  }

  message Discover {
    optional string ns     = 1;
    optional uint64 limit  = 2;
    optional bytes  cookie = 3;
  }

  message DiscoverResponse {
    message Registration {
      optional string ns               = 1;
      optional bytes  signedPeerRecord = 2;
    }
    optional ResponseStatus status          = 1;
    optional string         statusText      = 2;
    repeated Registration   registrations   = 3;
    optional bytes          cookie          = 4;
  }

  optional MessageType        type             = 1;
  optional Register           register         = 2;
  optional RegisterResponse   registerResponse = 3;
  optional Unregister         unregister       = 4;
  optional Discover           discover         = 5;
  optional DiscoverResponse   discoverResponse = 6;
}
